      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Server-Driven UI (SDUI) is an architecture where the server controls what UI to render inside your Android app. Instead of hardcoding layouts, your app reads JSON from the cloud and renders the corresponding Jetpack Compose components. Ketoy is the leading open-source SDUI framework for Android."
      }
    },
    {
      "@type": "Question",
      "name": "How does Ketoy implement Server-Driven UI on Android?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ketoy lets you define Jetpack Compose screens as JSON hosted on your server or cloud. The Ketoy SDK fetches and renders these JSON definitions as native Compose UI in real time — letting you update your Android app's interface without publishing a new APK to the Play Store."
      }
    },
    {
      "@type": "Question",
      "name": "Is Ketoy the best Server-Driven UI framework for Android?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ketoy is an open-source Server-Driven UI SDK purpose-built for Android Jetpack Compose. It supports dynamic layouts, cloud-managed screens, navigation, theming, and custom components — making it a complete SDUI solution for Android developers."

<script>
  lucide.createIcons();

  document.addEventListener('DOMContentLoaded', () => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.animationPlayState = 'running';
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.scroll-item').forEach(el => observer.observe(el));
  });
</script>
